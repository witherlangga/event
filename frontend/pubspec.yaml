name: event_tickets_frontend
description: Flutter frontend for Event Tickets (Android only)
publish_to: 'none'
version: 0.1.0
environment:
  sdk: ">=2.17.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.0.0
  http: ^0.13.0
  flutter_secure_storage: ^8.0.0
  image_picker: ^0.8.0
  qr_flutter: ^4.0.0
  geolocator: ^9.0.2
  shimmer: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
